name: Sync fork with upstream

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync controller-team-utilities fork
        run: |
          gh api repos/chrismeyersfsu/controller-team-utilities/merge-upstream \
            --method POST \
            --field branch=main
        env:
          GH_TOKEN: ${{ secrets.SYNC_FORK_PAT }}

      - name: Sync aap-dev fork
        run: |
          gh api repos/chrismeyersfsu/aap-dev/merge-upstream \
            --method POST \
            --field branch=main
        env:
          GH_TOKEN: ${{ secrets.SYNC_FORK_PAT }}

      - name: Rebase django-ansible-base-public telemetry branch onto upstream devel
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/chrismeyersfsu/django-ansible-base-public.git" repo
          cd repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote add upstream https://github.com/ansible/django-ansible-base.git
          git fetch upstream devel
          git checkout telemetry
          git rebase upstream/devel
          git push --force-with-lease origin telemetry
        env:
          GH_TOKEN: ${{ secrets.SYNC_FORK_PAT }}
